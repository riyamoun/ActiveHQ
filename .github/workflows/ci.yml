name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    env:
      # postinstall runs `playwright install`; lint/build does not need browsers.
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  e2e-smoke:
    runs-on: ubuntu-latest
    needs: frontend
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Start frontend dev server
        run: nohup npm run dev -- --host 127.0.0.1 --port 3002 > /tmp/activehq-frontend.log 2>&1 &
      - name: Wait for frontend
        run: |
          for i in {1..60}; do
            if curl -sf http://127.0.0.1:3002 > /dev/null; then
              echo "Frontend is up"
              exit 0
            fi
            sleep 2
          done
          echo "Frontend failed to start"
          cat /tmp/activehq-frontend.log || true
          exit 1
      - name: Run Playwright smoke tests
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3002
        run: npm run test:e2e:smoke
      - name: Run Playwright critical flow tests
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3002
        run: npm run test:e2e:critical
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest -q
