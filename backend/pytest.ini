[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# CI runs tests/test_smoke.py only. Run full suite locally: pytest (expect some SQLite/URL mismatches).
addopts = -v --tb=short --strict-markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
