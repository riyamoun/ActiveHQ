name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    env:
      # postinstall runs `playwright install`; lint/build does not need browsers.
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  e2e-smoke:
    runs-on: ubuntu-latest
    needs: frontend
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Start frontend dev server
        run: nohup npm run dev -- --host 127.0.0.1 --port 3002 > /tmp/activehq-frontend.log 2>&1 &
      - name: Wait for frontend
        run: |
          for i in {1..60}; do
            if curl -sf http://127.0.0.1:3002 > /dev/null; then
              echo "Frontend is up"
              exit 0
            fi
            sleep 2
          done
          echo "Frontend failed to start"
          cat /tmp/activehq-frontend.log || true
          exit 1
      - name: Run Playwright smoke tests
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3002
        run: npm run test:e2e:smoke
      - name: Run Playwright critical flow tests
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3002
        run: npm run test:e2e:critical
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: frontend/playwright-report

  backend:
    runs-on: ubuntu-latest
    # Smoke tests use a module-level TestClient against the real engine (see tests/test_smoke.py).
    # Without Postgres, /health/detailed and other routes can fail or hang waiting on TCP.
    services:
      postgres:
        # Debian-based image (more consistent with psycopg wheels than Alpine in CI)
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: activehq
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      # Use IPv4 explicitly (avoids occasional localhost → ::1 issues on runners)
      DATABASE_URL: sqlite:///./ci-activehq.sqlite
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Skip DB wait (SQLite)
        run: echo "Using SQLite in CI; skipping Postgres readiness check"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: pytest -q --tb=short
