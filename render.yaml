# Render Blueprint — ActiveHQ API
# Docs: https://render.com/docs/blueprint-spec
# Deploy: connect repo and Render will use this, or create Web Service manually with Docker.

services:
  - type: web
    name: activehq-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend

    # Render sets PORT (e.g. 10000). App binds to 0.0.0.0:${PORT}
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: activehq-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: CORS_ORIGINS_STR
        sync: false
        # Set in Dashboard: your frontend URL(s), e.g. https://activehq.onrender.com
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      # Set in Dashboard: INTERAKT_API_KEY, INTERAKT_TEMPLATE_RENEWAL, INTERAKT_TEMPLATE_PAYMENT_DUE, CRON_SECRET

    # Health check (uses GET /health)
    healthCheckPath: /health

databases:
  - name: activehq-db
    plan: free
    # For 100+ gyms use a paid plan and ensure backups are enabled.
