name: Android Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build-android-aab:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      # Avoid Playwright browser download during npm ci.
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
      # Native production web bundle target.
      VITE_API_URL: ${{ secrets.VITE_API_URL }}
      VITE_APP_URL: ${{ secrets.VITE_APP_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Install frontend dependencies
        run: npm ci

      - name: Decode Android keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/activehq-upload.jks

      - name: Create keystore.properties
        run: |
          cat > android/keystore.properties <<'EOF'
          storeFile=activehq-upload.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build + sync web assets into Android project
        run: npm run mobile:sync

      - name: Build signed Android App Bundle (AAB)
        run: |
          cd android
          ./gradlew bundleRelease

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: activehq-aab-${{ github.ref_name }}
          path: frontend/android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      - name: Attach AAB to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: frontend/android/app/build/outputs/bundle/release/app-release.aab
